name: Conniver Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [x64, arm64]
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        check-latest: true
        cache: true
  
    - name: Install dependencies
      run: go get -v ./...

    - name: Run tests
      run: go test -v ./...